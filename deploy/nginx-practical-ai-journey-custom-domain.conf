# Practical AI Journey Website — custom domain server block
#
# This server block is for the FUTURE custom-domain cutover and is
# intentionally NOT enabled until David confirms the final public
# host(s). It complements the existing /projects/practical-ai-journey
# location (deploy/nginx-practical-ai-journey.conf) which keeps
# serving the legacy subpath fallback until the new host is stable.
#
# Pair with deploy/practical-ai-journey-custom-domain.service, which
# runs the app on 127.0.0.1:8011 with PRACTICAL_AI_ROOT_PATH= (empty)
# so root_path is "" and url_for('static', ...) emits /static/...
#
# --------------------------------------------------------------------
# BEFORE ENABLING THIS SERVER BLOCK, DAVID MUST CONFIRM:
#   1. The final public host(s) — replace PRACTICAL_AI_DOMAIN below.
#   2. Whether www.<apex> should also resolve.
#   3. Which host is canonical (apex vs www) — the canonical redirect
#      block is stubbed below and left commented out until that is
#      decided.
#   4. The TLS termination strategy (Cloudflare edge vs origin certbot).
#      Listen 80 is intentionally left active so the HTTP-only smoke
#      checks in the verification section can run without TLS; the
#      HTTPS listen block is left as a TODO comment.
# --------------------------------------------------------------------

# --- Canonical host redirect (optional, deferred) -------------------
# Uncomment and adjust once the canonical apex/www pair is confirmed.
# server {
#     listen 80;
#     listen [::]:80;
#     server_name www.<APEX>;
#     return 301 https://<CANONICAL>$request_uri;
# }

server {
    listen 80;
    listen [::]:80;
    server_name PRACTICAL_AI_DOMAIN;

    # Forwarded headers: let the app see the original public host and
    # protocol so any future absolute-URL logic (canonical links,
    # sitemap, Open Graph) stays correct behind nginx.
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # uvicorn already builds its own Location headers; do not let nginx
    # try to rewrite them.
    proxy_redirect off;

    # Domain-root deployment: pass traffic straight through to the
    # domain-root uvicorn instance. The app is mounted at "/" (no
    # subpath) because PRACTICAL_AI_ROOT_PATH= is empty in the matching
    # service unit.
    location / {
        proxy_pass http://127.0.0.1:8011;
    }

    # --- TODO: HTTPS listen block + certbot/Cloudflare origin cert ---
    # Add once the TLS strategy is confirmed. Intentionally left out of
    # this PR so the HTTP smoke path can be verified first.
}

# EXISTING /projects/practical-ai-journey LOCATION BLOCK IS INTENTIONALLY
# NOT MODIFIED HERE. It lives in deploy/nginx-practical-ai-journey.conf
# and continues to serve the legacy subpath fallback on 127.0.0.1:8010
# until the custom domain is stable. Do not edit it from this file.